<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ayah Mirror — Find Quran Verses for Your Heart</title>
  <meta name="description" content="An Islamic reflection app that matches Quran verses to your emotional state." />
  <meta name="theme-color" content="#f9fdfb" />

  <!-- ══════════════════════════════════════════════════════════
       STYLES
       Clean white/green Islamic-inspired theme.
       Mobile-first responsive design.
       ══════════════════════════════════════════════════════════ -->
  <style>
    /* ── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ────────────────────────────────────────── */
    :root {
      --bg:         #f9fdfb;          /* soft off-white with a green tint */
      --bg-card:    #ffffff;
      --bg-hover:   #f0f7f2;
      --border:     #e0ebe4;
      --green:      #1f7a4d;          /* deep green — primary */
      --green-light:#4caf50;          /* accent green */
      --green-glow: rgba(31,122,77,0.08);
      --green-soft: rgba(76,175,80,0.10);
      --text:       #1a1a1a;          /* near-black for readability */
      --text-muted: #5a6b5e;
      --text-dim:   #8a9b8e;
      --danger:     #c0392b;
      --success:    #27ae60;
      --radius:     14px;
      --radius-sm:  10px;
      --font:       'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-arabic: 'Traditional Arabic', 'Scheherazade New', 'Noto Naskh Arabic', serif;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --nav-height: 64px;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06);
      --shadow-md:  0 4px 12px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    /* ── Subtle background pattern ────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(31,122,77,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(76,175,80,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── App shell ────────────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.04em;
    }

    .header-title span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 13px;
      margin-left: 8px;
    }

    /* ── Screen container ─────────────────────────────────────── */
    .screens {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 20px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
      -webkit-overflow-scrolling: touch;
    }

    .screen.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* ── Bottom navigation bar ────────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: var(--nav-height);
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.04em;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      transition: color var(--transition), background var(--transition), transform 0.15s ease;
    }

    .nav-btn svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.8;
      fill: none;
      stroke: currentColor;
    }

    .nav-btn.active {
      color: var(--green);
    }

    .nav-btn:hover {
      color: var(--green);
      background: var(--green-glow);
    }

    /* Tap animation on nav buttons */
    .nav-btn:active {
      transform: scale(0.93);
    }

    /* ── Cards ────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Section titles ───────────────────────────────────────── */
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── Emotion chips ────────────────────────────────────────── */
    .emotion-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .emotion-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition), transform 0.15s ease;
      user-select: none;
      box-shadow: var(--shadow-sm);
    }

    .emotion-chip:hover {
      border-color: var(--green-light);
      background: var(--green-glow);
    }

    /* Tap animation on chips */
    .emotion-chip:active {
      transform: scale(0.95);
    }

    .emotion-chip.selected {
      border-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
      box-shadow: 0 0 0 2px rgba(31,122,77,0.15);
    }

    .emotion-chip .emoji {
      font-size: 18px;
    }

    /* ── Custom text input ────────────────────────────────────── */
    .text-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .text-input:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
    }

    .text-input::placeholder {
      color: var(--text-dim);
    }

    /* ── Primary button ───────────────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      border: none;
      border-radius: var(--radius-sm);
      color: #ffffff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition), transform 0.15s ease;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(31,122,77,0.25);
      transform: translateY(-1px);
    }

    /* Tap animation */
    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: none;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Ghost button ─────────────────────────────────────────── */
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition), transform 0.15s ease;
    }

    .btn-ghost:hover {
      border-color: var(--green-light);
      color: var(--green);
      background: var(--green-glow);
    }

    /* Tap animation */
    .btn-ghost:active {
      transform: scale(0.95);
    }

    /* ── Arabic text styling ──────────────────────────────────── */
    .arabic {
      font-family: var(--font-arabic);
      font-size: 26px;
      line-height: 2;
      text-align: right;
      direction: rtl;
      color: var(--green);
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* ── Verse reference ──────────────────────────────────────── */
    .verse-ref {
      font-size: 12px;
      color: var(--green-light);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* ── Translation text ─────────────────────────────────────── */
    .translation {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 12px;
      font-style: italic;
    }

    /* ── Explanation block — green left border ─────────────────── */
    .explanation {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      padding: 14px 16px;
      background: var(--green-glow);
      border-left: 5px solid var(--green);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .explanation strong {
      color: var(--green);
      font-weight: 600;
    }

    /* ── Ayah card — the main verse display card ──────────────── */
    .ayah-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 5px solid var(--green);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-md);
    }

    /* ── Textarea ─────────────────────────────────────────────── */
    textarea.text-input {
      resize: vertical;
      min-height: 80px;
    }

    /* ── Divider ──────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* ── History list ─────────────────────────────────────────── */
    .history-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
      cursor: pointer;
    }

    .history-item:last-child { border-bottom: none; }

    .history-item:hover { background: var(--bg-hover); }

    .history-date {
      font-size: 11px;
      color: var(--text-dim);
    }

    .history-emotion {
      font-size: 14px;
      color: var(--green);
      font-weight: 600;
      margin: 4px 0;
    }

    .history-verse {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .history-reflection {
      font-size: 12px;
      color: var(--green-light);
      margin-top: 6px;
      padding: 8px 10px;
      background: var(--green-glow);
      border-radius: 6px;
    }

    /* ── Empty state ──────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* ── Daily ayah banner ────────────────────────────────────── */
    .daily-banner {
      text-align: center;
      padding: 8px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--green);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ── Fade-in animation ────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      animation: fadeUp 0.5s ease forwards;
    }

    .fade-up-delay-1 { animation-delay: 0.15s; opacity: 0; }
    .fade-up-delay-2 { animation-delay: 0.3s;  opacity: 0; }
    .fade-up-delay-3 { animation-delay: 0.45s; opacity: 0; }

    /* ── Ayah swap transition (fade out then fade in) ─────────── */
    @keyframes ayahFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ayah-swap {
      animation: ayahFadeIn 0.4s ease forwards;
    }

    /* ── Toast notification ───────────────────────────────────── */
    .save-toast {
      position: fixed;
      bottom: calc(var(--nav-height) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: #ffffff;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      pointer-events: none;
      box-shadow: var(--shadow-md);
    }

    .save-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Clear history / danger button ────────────────────────── */
    .btn-danger {
      color: var(--danger);
      border-color: rgba(192,57,43,0.25);
    }

    .btn-danger:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(192,57,43,0.06);
    }

    /* ── Scrollbar ────────────────────────────────────────────── */
    .screen::-webkit-scrollbar { width: 4px; }
    .screen::-webkit-scrollbar-track { background: transparent; }
    .screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Bismillah ────────────────────────────────────────────── */
    .bismillah {
      text-align: center;
      font-family: var(--font-arabic);
      font-size: 24px;
      color: var(--green);
      padding: 12px 0 4px;
      opacity: 0.7;
    }

    .intro-text {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 24px;
      line-height: 1.7;
    }

    /* ── Ayah counter badge ───────────────────────────────────── */
    .ayah-counter {
      display: inline-block;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ═══ HEADER ════════════════════════════════════════════════ -->
  <header class="header">
    <div class="header-title">
      Ayah Mirror <span>— reflect &amp; heal</span>
    </div>
  </header>

  <!-- ═══ SCREEN CONTAINER ══════════════════════════════════════ -->
  <div class="screens">

    <!-- ─── HOME SCREEN ──────────────────────────────────────── -->
    <div class="screen active" id="screen-home">

      <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
      <p class="intro-text">
        How are you feeling right now?<br />
        Select what resonates, and let the Quran speak to your heart.
      </p>

      <div class="section-title">Choose your feeling</div>
      <div class="emotion-grid" id="emotionGrid"></div>

      <div style="margin-top:16px;">
        <input
          type="text"
          class="text-input"
          id="customEmotion"
          placeholder="Or type how you feel..."
          autocomplete="off"
        />
      </div>

      <div style="margin-top:20px;">
        <button class="btn-primary" id="findAyahBtn" disabled>
          Find My Ayah
        </button>
      </div>
    </div>

    <!-- ─── RESULT SCREEN ────────────────────────────────────── -->
    <div class="screen" id="screen-result">
      <div id="resultContent"></div>
    </div>

    <!-- ─── DAILY AYAH SCREEN ────────────────────────────────── -->
    <div class="screen" id="screen-daily">
      <div class="daily-banner">Your Daily Ayah</div>
      <div id="dailyContent"></div>
    </div>

    <!-- ─── HISTORY SCREEN ───────────────────────────────────── -->
    <div class="screen" id="screen-history">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin-bottom:0;">Your History</div>
        <button class="btn-ghost btn-danger" id="clearHistoryBtn" style="font-size:11px;padding:6px 12px;">
          Clear All
        </button>
      </div>
      <div class="card" style="padding:0;overflow:hidden;" id="historyList"></div>
    </div>

  </div>

  <!-- ═══ BOTTOM NAVIGATION ═════════════════════════════════════ -->
  <nav class="nav">
    <button class="nav-btn active" data-screen="home">
      <svg viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
      Home
    </button>
    <button class="nav-btn" data-screen="daily">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      Daily
    </button>
    <button class="nav-btn" data-screen="history">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </button>
  </nav>

  <!-- Toast notification -->
  <div class="save-toast" id="toast">Saved!</div>

</div>

<!-- ══════════════════════════════════════════════════════════════
     JAVASCRIPT
     All app logic: data, navigation, matching, storage.
     Well-commented for learning purposes.
     ══════════════════════════════════════════════════════════════ -->
<script>
/* ────────────────────────────────────────────────────────────────
   1. AYAH DATABASE
   Each entry maps an emotion to MULTIPLE Quran verses (min 3).
   Fields per entry:
     - ayah:        the verse in Arabic script
     - reference:   surah name and ayah number
     - translation: English meaning
     - explanation: short tafsir-style note
     - reason:      why this verse speaks to that emotion
   ──────────────────────────────────────────────────────────────── */

const AYAH_DATA = [
  {
    emotion: "Anxiety",
    emoji: "😰",
    entries: [
      {
        ayah: "أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ",
        reference: "Surah Ar-Ra'd (13:28)",
        translation: "Verily, in the remembrance of Allah do hearts find rest.",
        explanation: "This verse reminds us that lasting tranquillity comes not from controlling every outcome, but from turning our hearts to Allah.",
        reason: "When anxiety grips you, it often stems from trying to control what you cannot. This ayah gently redirects your focus — peace is found not in certainty about the future, but in remembrance of the One who holds it all."
      },
      {
        ayah: "وَمَن يَتَوَكَّلْ عَلَى اللَّهِ فَهُوَ حَسْبُهُ",
        reference: "Surah At-Talaq (65:3)",
        translation: "And whoever relies upon Allah — then He is sufficient for him.",
        explanation: "Tawakkul (trust in Allah) does not mean inaction — it means doing your part and leaving the outcome to Him.",
        reason: "Anxiety often comes from feeling alone with your burdens. This verse assures you that when you place your trust in Allah, He is enough — you are never carrying the weight alone."
      },
      {
        ayah: "فَاصْبِرْ إِنَّ وَعْدَ اللَّهِ حَقٌّ وَلَا يَسْتَخِفَّنَّكَ الَّذِينَ لَا يُوقِنُونَ",
        reference: "Surah Ar-Rum (30:60)",
        translation: "So be patient. Indeed, the promise of Allah is truth. And let not those who have no certainty discourage you.",
        explanation: "Allah commands steadfastness and reminds us that His promises are guaranteed — even when the world around us creates doubt.",
        reason: "Anxiety feeds on uncertainty and the fear that things will go wrong. This verse anchors you: Allah's promise is true. Whatever you are anxious about, He already has a plan for it."
      }
    ]
  },
  {
    emotion: "Sadness",
    emoji: "😢",
    entries: [
      {
        ayah: "وَلَسَوْفَ يُعْطِيكَ رَبُّكَ فَتَرْضَىٰ",
        reference: "Surah Ad-Duha (93:5)",
        translation: "And your Lord is going to give you, and you will be satisfied.",
        explanation: "Revealed when the Prophet ﷺ was going through a period of sadness. Allah promised that ease and contentment were coming.",
        reason: "When sadness feels heavy and unending, this ayah is Allah's direct promise — what is coming for you is better than what has passed. Your current pain is not your final chapter."
      },
      {
        ayah: "مَا وَدَّعَكَ رَبُّكَ وَمَا قَلَىٰ",
        reference: "Surah Ad-Duha (93:3)",
        translation: "Your Lord has not taken leave of you, nor has He detested [you].",
        explanation: "The Prophet ﷺ feared Allah had abandoned him when revelation paused. Allah reassured him personally — He had not left.",
        reason: "Sadness can whisper that you are forgotten, that Allah is distant. This verse is a direct rebuttal: He has not left you, He has not turned away. You are still on His mind."
      },
      {
        ayah: "وَبَشِّرِ الصَّابِرِينَ ۝ الَّذِينَ إِذَا أَصَابَتْهُم مُّصِيبَةٌ قَالُوا إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ",
        reference: "Surah Al-Baqarah (2:155-156)",
        translation: "And give good tidings to the patient — who, when disaster strikes them, say: 'Indeed we belong to Allah, and indeed to Him we will return.'",
        explanation: "Inna lillahi wa inna ilayhi raji'un is not only for death — it is for every loss and trial that touches your life.",
        reason: "Your sadness is valid, and this verse does not ask you to suppress it. Instead, it offers you the most powerful words to say in the middle of it — words that connect your pain back to the One who can heal it."
      }
    ]
  },
  {
    emotion: "Lack of Motivation",
    emoji: "😔",
    entries: [

/* ────────────────────────────────────────────────────────────────
   2. STATE
   Track selected emotion, shown ayah indexes (to prevent
   repeats), and manage local storage for history.
   ──────────────────────────────────────────────────────────────── */

let selectedEmotion = null;       // currently selected emotion string
let currentEntry    = null;       // the ayah entry being displayed

/*
 * Non-repeating tracker: keeps track of which ayah indexes
 * have been shown for each emotion. Once all are shown,
 * the list resets so the cycle starts fresh.
 *
 * Structure: { "Anxiety": [0, 2], "Sadness": [1] }
 * Meaning: for Anxiety, indexes 0 and 2 have been shown already.
 */
const shownIndexes = {};

const STORAGE_KEY = 'ayah_mirror_history';


/* ────────────────────────────────────────────────────────────────
   3. LOCAL STORAGE HELPERS
   ──────────────────────────────────────────────────────────────── */

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}

function saveToHistory(entry) {
  const history = loadHistory();
  history.unshift(entry);
  if (history.length > 100) history.length = 100;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function clearHistory() {
  localStorage.removeItem(STORAGE_KEY);
}


/* ────────────────────────────────────────────────────────────────
   4. NAVIGATION
   ──────────────────────────────────────────────────────────────── */

const navButtons = document.querySelectorAll('.nav-btn');
const screens    = document.querySelectorAll('.screen');

function navigateTo(screenName) {
  screens.forEach(s => s.classList.remove('active'));
  const target = document.getElementById(`screen-${screenName}`);
  if (target) target.classList.add('active');

  navButtons.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.screen === screenName);
  });

  if (screenName === 'history') renderHistory();
  if (screenName === 'daily')   renderDaily();
}

navButtons.forEach(btn => {
  btn.addEventListener('click', () => navigateTo(btn.dataset.screen));
});


/* ────────────────────────────────────────────────────────────────
   5. EMOTION GRID
   ──────────────────────────────────────────────────────────────── */

const emotionGrid = document.getElementById('emotionGrid');
const customInput = document.getElementById('customEmotion');
const findBtn     = document.getElementById('findAyahBtn');

function renderEmotionGrid() {
  emotionGrid.innerHTML = AYAH_DATA.map(a => `
    <button class="emotion-chip" data-emotion="${a.emotion}">
      <span class="emoji">${a.emoji}</span>
      ${a.emotion}
    </button>
  `).join('');

  emotionGrid.querySelectorAll('.emotion-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      emotionGrid.querySelectorAll('.emotion-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      selectedEmotion = chip.dataset.emotion;
      customInput.value = '';
      findBtn.disabled = false;
    });
  });
}

renderEmotionGrid();

customInput.addEventListener('input', () => {
  if (customInput.value.trim()) {
    emotionGrid.querySelectorAll('.emotion-chip').forEach(c => c.classList.remove('selected'));
    selectedEmotion = null;
    findBtn.disabled = false;
  } else {
    findBtn.disabled = !selectedEmotion;
  }
});


/* ────────────────────────────────────────────────────────────────
   6. AYAH MATCHING (non-repeating)
   Uses shownIndexes to cycle through all ayahs for an emotion
   before repeating any. This fixes the "same ayah" bug.
   ──────────────────────────────────────────────────────────────── */

/**
 * Pick the next unseen ayah for a given AYAH_DATA group.
 * Returns the entry and its index within the group's entries array.
 */
function pickNonRepeatingEntry(group) {
  const emotionKey = group.emotion;
  const total      = group.entries.length;

  // Initialise tracking array if not present
  if (!shownIndexes[emotionKey]) {
    shownIndexes[emotionKey] = [];
  }

  // If all ayahs have been shown, reset the cycle
  if (shownIndexes[emotionKey].length >= total) {
    shownIndexes[emotionKey] = [];
  }

  // Find indexes that haven't been shown yet
  const available = [];
  for (let i = 0; i < total; i++) {
    if (!shownIndexes[emotionKey].includes(i)) {
      available.push(i);
    }
  }

  // Pick a random one from the available pool
  const pick  = available[Math.floor(Math.random() * available.length)];
  shownIndexes[emotionKey].push(pick);

  return {
    entry: group.entries[pick],
    index: pick,
    shown: shownIndexes[emotionKey].length,
    total: total
  };
}

/**
 * Find the best matching emotion group and pick a non-repeating ayah.
 */
function matchEmotion(emotionStr) {
  const lower = emotionStr.toLowerCase().trim();

  // Exact match first
  let group = AYAH_DATA.find(a => a.emotion.toLowerCase() === lower);

  // Synonym lookup
  if (!group) {
    const keywords = lower.split(/\s+/);
    const synonyms = {
      anxious: 'anxiety', worried: 'anxiety', nervous: 'anxiety', stressed: 'anxiety', stress: 'anxiety', panic: 'anxiety',
      sad: 'sadness', depressed: 'sadness', down: 'sadness', unhappy: 'sadness', miserable: 'sadness', blue: 'sadness',
      unmotivated: 'lack of motivation', lazy: 'lack of motivation', tired: 'lack of motivation', exhausted: 'lack of motivation', burnout: 'lack of motivation',
      grateful: 'gratitude', thankful: 'thankfulness', blessed: 'thankfulness', appreciative: 'gratitude',
      angry: 'anger', furious: 'anger', frustrated: 'anger', mad: 'anger', irritated: 'anger', rage: 'anger',
      lost: 'feeling lost', confused: 'confusion', directionless: 'feeling lost', aimless: 'feeling lost', stuck: 'feeling lost',
      afraid: 'fear', scared: 'fear', terrified: 'fear', frightened: 'fear',
      alone: 'loneliness', lonely: 'loneliness', isolated: 'loneliness',
      grieving: 'grief', mourning: 'grief', loss: 'grief', bereaved: 'grief',
      hopeless: 'hopelessness', despair: 'hopelessness', desperate: 'hopelessness', worthless: 'hopelessness',
      impatient: 'impatience', restless: 'impatience', waiting: 'impatience',
      insecure: 'self-doubt', unworthy: 'self-doubt', inadequate: 'self-doubt', 'not enough': 'self-doubt', imposter: 'self-doubt',
      overwhelmed: 'overwhelmed', drowning: 'overwhelmed', 'too much': 'overwhelmed',
      jealous: 'jealousy', envious: 'jealousy', envy: 'jealousy',
      guilty: 'guilt', ashamed: 'guilt', shame: 'guilt', regret: 'guilt', remorse: 'guilt',
      heartbroken: 'heartbreak', rejected: 'heartbreak', betrayed: 'heartbreak', hurt: 'heartbreak', broken: 'heartbreak',
      happy: 'thankfulness', joyful: 'thankfulness', content: 'thankfulness',
    };

    for (const kw of keywords) {
      if (synonyms[kw]) {
        group = AYAH_DATA.find(a => a.emotion.toLowerCase() === synonyms[kw]);
        if (group) break;
      }
    }

    // Partial match
    if (!group) {
      for (const a of AYAH_DATA) {
        const emotionLower = a.emotion.toLowerCase();
        for (const kw of keywords) {
          if (emotionLower.includes(kw) || kw.includes(emotionLower)) {
            group = a;
            break;
          }
        }
        if (group) break;
      }
    }
  }

  // Fallback: random group
  if (!group) {
    group = AYAH_DATA[Math.floor(Math.random() * AYAH_DATA.length)];
  }

  // Pick a non-repeating entry from the matched group
  const result = pickNonRepeatingEntry(group);
  return {
    emotion: group.emotion,
    emoji:   group.emoji,
    entry:   result.entry,
    shown:   result.shown,
    total:   result.total
  };
}


/* ────────────────────────────────────────────────────────────────
   7. RESULT SCREEN
   Display the matched ayah with reflection prompts.
   Uses the new ayah-card class with green left border.
   ──────────────────────────────────────────────────────────────── */

const resultContent = document.getElementById('resultContent');

function showResult(emotionStr) {
  const match = matchEmotion(emotionStr);
  if (!match) return;

  currentEntry = match;
  const { emotion, emoji, entry, shown, total } = match;

  resultContent.innerHTML = `
    <!-- Matched emotion label -->
    <div class="daily-banner fade-up">
      ${emoji} Showing ayah for: <strong>${emotion}</strong>
    </div>

    <!-- The ayah card — green left border, clean hierarchy -->
    <div class="ayah-card fade-up fade-up-delay-1" id="ayahDisplay">
      <div class="arabic">${entry.ayah}</div>
      <div class="verse-ref">${entry.reference}</div>
      <p class="translation">"${entry.translation}"</p>
      <div class="explanation">
        <strong>Why this ayah speaks to you:</strong><br />
        ${entry.reason}
      </div>
      <div class="divider"></div>
      <p style="font-size:12px;color:var(--text-muted);">${entry.explanation}</p>
      <div class="ayah-counter">${shown} of ${total} ayat shown for this feeling</div>
    </div>

    <!-- Reflection section -->
    <div class="card fade-up fade-up-delay-2">
      <div class="section-title">Reflect</div>
      <label style="font-size:13px;color:var(--text-muted);display:block;margin-bottom:6px;">
        What did you learn from this ayah?
      </label>
      <textarea class="text-input" id="learnedInput" placeholder="Write your thoughts..." rows="3"></textarea>

      <label style="font-size:13px;color:var(--text-muted);display:block;margin:14px 0 6px;">
        What action will you take?
      </label>
      <textarea class="text-input" id="actionInput" placeholder="One small step..." rows="2"></textarea>

      <div style="margin-top:16px;display:flex;gap:10px;">
        <button class="btn-primary" id="saveReflectionBtn" style="flex:1;">
          Save Reflection
        </button>
        <button class="btn-ghost" id="skipSaveBtn">
          Skip
        </button>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="fade-up fade-up-delay-3" style="text-align:center;margin-top:8px;">
      <button class="btn-ghost" id="anotherAyahBtn" style="margin-right:8px;">
        Show Another Ayah
      </button>
      <button class="btn-ghost" id="backHomeBtn">
        Back to Home
      </button>
    </div>
  `;

  // Wire up Save button
  document.getElementById('saveReflectionBtn').addEventListener('click', () => {
    const learned = document.getElementById('learnedInput').value.trim();
    const action  = document.getElementById('actionInput').value.trim();
    saveToHistory({
      date: new Date().toISOString(),
      emotion,
      reference: entry.reference,
      translation: entry.translation,
      learnedText: learned || '',
      actionText: action || ''
    });
    showToast('Reflection saved!');
    setTimeout(() => navigateTo('home'), 800);
    resetHomeSelection();
  });

  // Skip — save to history without reflection text
  document.getElementById('skipSaveBtn').addEventListener('click', () => {
    saveToHistory({
      date: new Date().toISOString(),
      emotion,
      reference: entry.reference,
      translation: entry.translation,
      learnedText: '',
      actionText: ''
    });
    navigateTo('home');
    resetHomeSelection();
  });

  /*
   * "Show Another Ayah" — smoothly swaps the ayah card content
   * instead of rebuilding the entire page. Uses a fade-out then
   * fade-in transition to prevent UI flicker.
   */
  document.getElementById('anotherAyahBtn').addEventListener('click', () => {
    const ayahCard = document.getElementById('ayahDisplay');

    // Fade out the current card
    ayahCard.style.opacity = '0';
    ayahCard.style.transform = 'translateY(10px)';
    ayahCard.style.transition = 'opacity 0.25s ease, transform 0.25s ease';

    // After fade-out completes, swap content and fade back in
    setTimeout(() => {
      const newMatch = matchEmotion(emotionStr);
      currentEntry = newMatch;

      ayahCard.innerHTML = `
        <div class="arabic">${newMatch.entry.ayah}</div>
        <div class="verse-ref">${newMatch.entry.reference}</div>
        <p class="translation">"${newMatch.entry.translation}"</p>
        <div class="explanation">
          <strong>Why this ayah speaks to you:</strong><br />
          ${newMatch.entry.reason}
        </div>
        <div class="divider"></div>
        <p style="font-size:12px;color:var(--text-muted);">${newMatch.entry.explanation}</p>
        <div class="ayah-counter">${newMatch.shown} of ${newMatch.total} ayat shown for this feeling</div>
      `;

      // Fade back in
      requestAnimationFrame(() => {
        ayahCard.style.opacity = '1';
        ayahCard.style.transform = 'translateY(0)';
      });
    }, 250);
  });

  // Back to Home
  document.getElementById('backHomeBtn').addEventListener('click', () => {
    navigateTo('home');
    resetHomeSelection();
  });

  navigateTo('result');
}

function resetHomeSelection() {
  selectedEmotion = null;
  customInput.value = '';
  findBtn.disabled = true;
  emotionGrid.querySelectorAll('.emotion-chip').forEach(c => c.classList.remove('selected'));
}

// Find Ayah button
findBtn.addEventListener('click', () => {
  const emotion = selectedEmotion || customInput.value.trim();
  if (emotion) showResult(emotion);
});

// Enter key in custom input
customInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && customInput.value.trim()) {
    showResult(customInput.value.trim());
  }
});


/* ────────────────────────────────────────────────────────────────
   8. HISTORY SCREEN
   ──────────────────────────────────────────────────────────────── */

function renderHistory() {
  const list    = document.getElementById('historyList');
  const history = loadHistory();

  if (history.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">📖</div>
        <p>No reflections yet.</p>
        <p style="font-size:12px;margin-top:4px;">Your journey begins on the home screen.</p>
      </div>`;
    return;
  }

  list.innerHTML = history.map(h => {
    const date = new Date(h.date);
    const dateStr = date.toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const hasReflection = h.learnedText || h.actionText;
    return `
      <div class="history-item">
        <div class="history-date">${dateStr}</div>
        <div class="history-emotion">${h.emotion}</div>
        <div class="history-verse">"${h.translation}" — ${h.reference}</div>
        ${hasReflection ? `<div class="history-reflection">
          ${h.learnedText ? `Learned: ${h.learnedText}` : ''}
          ${h.actionText ? `${h.learnedText ? '<br/>' : ''}Action: ${h.actionText}` : ''}
        </div>` : ''}
      </div>`;
  }).join('');
}

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  if (confirm('Clear all history? This cannot be undone.')) {
    clearHistory();
    renderHistory();
    showToast('History cleared');
  }
});


/* ────────────────────────────────────────────────────────────────
   9. DAILY AYAH
   Picks a personalised ayah based on your most frequent emotion.
   Uses a date-based seed so it stays stable for the whole day.
   ──────────────────────────────────────────────────────────────── */

function renderDaily() {
  const content = document.getElementById('dailyContent');
  const history = loadHistory();

  let topEmotion = null;
  if (history.length > 0) {
    const freq = {};
    history.forEach(h => { freq[h.emotion] = (freq[h.emotion] || 0) + 1; });
    topEmotion = Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
  }

  const today   = new Date();
  const daySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();

  let group;
  if (topEmotion) {
    group = AYAH_DATA.find(a => a.emotion.toLowerCase() === topEmotion.toLowerCase());
  }
  if (!group) {
    group = AYAH_DATA[daySeed % AYAH_DATA.length];
  }

  const entry = group.entries[daySeed % group.entries.length];

  content.innerHTML = `
    ${topEmotion ? `<p style="text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:16px;">
      Based on your reflections, you often feel <strong style="color:var(--green);">${topEmotion.toLowerCase()}</strong>.<br/>
      Here is today's ayah chosen for you.
    </p>` : `<p style="text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:16px;">
      Start reflecting on the home screen to get personalised daily ayat.
    </p>`}

    <div class="ayah-card fade-up">
      <div class="arabic">${entry.ayah}</div>
      <div class="verse-ref">${entry.reference}</div>
      <p class="translation">"${entry.translation}"</p>
      <div class="divider"></div>
      <p style="font-size:13px;color:var(--text-muted);">${entry.explanation}</p>
    </div>

    <div class="card fade-up fade-up-delay-1">
      <div class="explanation">
        <strong>Reflection prompt:</strong><br />
        ${entry.reason}
      </div>
    </div>
  `;
}


/* ────────────────────────────────────────────────────────────────
   10. TOAST NOTIFICATION
   ──────────────────────────────────────────────────────────────── */

const toast = document.getElementById('toast');

function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}


/* ────────────────────────────────────────────────────────────────
   11. INITIALISATION
   ──────────────────────────────────────────────────────────────── */

renderDaily();
